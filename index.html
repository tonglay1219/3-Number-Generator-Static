<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pick 3 Numbers</title>

<style>
* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

:root {
    --bg: #f8fafc;
    --card: #ffffff;
    --border: #e2e8f0;
    --text: #0f172a;
    --muted: #64748b;
    --primary: #2563eb;
    --primary-hover: #1d4ed8;
    --success: #16a34a;

    --shadow:
        0 4px 12px rgba(15, 23, 42, 0.06),
        0 1px 3px rgba(15, 23, 42, 0.08);
}

html,
body {
    height: 100%;
}

body {
    font-family:
        Inter,
        ui-sans-serif,
        system-ui,
        -apple-system,
        BlinkMacSystemFont,
        "Segoe UI",
        sans-serif;

    background: var(--bg);
    color: var(--text);

    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* ---------- TOP BAR ---------- */

.top-bar {
    flex-shrink: 0;

    background: var(--card);
    padding: 16px;
    box-shadow: var(--shadow);
    border-bottom: 1px solid var(--border);
}

.top-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
}

.tracker-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
    margin-top: 12px;
}

button,
select {
    width: 100%;
    height: 52px;

    border: none;
    border-radius: 14px;

    font-size: 15px;
    font-weight: 600;
}

button {
    cursor: pointer;
    color: white;

    background: linear-gradient(
        135deg,
        var(--primary),
        #3b82f6
    );

    transition:
        transform .15s ease,
        opacity .15s ease;
}

button:hover {
    transform: translateY(-1px);
}

button:active {
    transform: scale(0.97);
}

button:disabled {
    opacity: 0.45;
    cursor: not-allowed;
}

select {
    padding: 0 12px;
    background: white;
    border: 1px solid var(--border);
    color: var(--text);
}

.tracker {
    height: 52px;

    border-radius: 14px;
    border: 1px solid var(--border);

    background: white;
    box-shadow: var(--shadow);

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: 24px;
    font-weight: 700;
    color: var(--primary);
}

.message {
    margin-top: 12px;

    text-align: center;
    font-size: 15px;
    font-weight: 600;
    color: var(--muted);
}

/* ---------- GRID ---------- */

.grid {
    flex: 1;
    min-height: 0;

    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);

    gap: 12px;
    padding: 12px;
}

.cell {
    background: white;
    border-radius: 22px;

    display: flex;
    justify-content: center;
    align-items: center;

    font-size: clamp(42px, 8vw, 90px);
    font-weight: 800;

    box-shadow: var(--shadow);

    cursor: pointer;
    user-select: none;

    transition:
        transform .15s ease,
        box-shadow .15s ease;
}

.cell:hover {
    transform: translateY(-3px);
}

.cell:active {
    transform: scale(0.97);
}

.cell.disabled {
    opacity: 0.45;
    cursor: not-allowed;
}

/* ---------- MOBILE ---------- */

@media (max-width: 600px) {

    .top-bar {
        padding: 12px;
    }

    .top-row,
    .tracker-row {
        gap: 8px;
    }

    button,
    select,
    .tracker {
        height: 48px;
    }

    .tracker {
        font-size: 20px;
    }

    .grid {
        gap: 8px;
        padding: 8px;
    }

    .cell {
        border-radius: 18px;
        font-size: clamp(36px, 10vw, 72px);
    }
}
</style>
</head>
<body>

<div class="top-bar">

    <div class="top-row">
        <button onclick="resetGame()">🧹</button>

        <button onclick="generateGrid()" id="refreshBtn">
            🔄
        </button>

        <select id="rangeSelect" onchange="resetGame()">
            <option value="9" selected>1–9</option>
            <option value="99">1–99</option>
        </select>
    </div>

    <div class="tracker-row">
        <div class="tracker" id="tracker1"></div>
        <div class="tracker" id="tracker2"></div>
        <div class="tracker" id="tracker3"></div>
    </div>

    <div class="message" id="message"></div>

</div>

<div class="grid" id="grid"></div>

<script>
const trackers = [
    document.getElementById("tracker1"),
    document.getElementById("tracker2"),
    document.getElementById("tracker3")
];

const grid = document.getElementById("grid");
const message = document.getElementById("message");
const refreshBtn = document.getElementById("refreshBtn");

function getMaxRange() {
    return Number(
        document.getElementById("rangeSelect").value
    );
}

function generateUniqueNumbers(count, min, max) {

    const numbers = [];

    while (numbers.length < count) {

        const num =
            Math.floor(
                Math.random() * (max - min + 1)
            ) + min;

        if (!numbers.includes(num)) {
            numbers.push(num);
        }
    }

    return numbers;
}

function trackersFull() {
    return trackers.every(
        tracker => tracker.textContent !== ""
    );
}

function selectedCount() {
    return trackers.filter(
        tracker => tracker.textContent !== ""
    ).length;
}

function updateMessage() {

    const count = selectedCount();

    if (count === 0) {
        message.textContent = "Pick 3 numbers";
    }
    else if (count < 3) {
        message.textContent =
            `Pick ${3 - count} more number${3 - count > 1 ? "s" : ""}`;
    }
    else {
        message.textContent =
            "All 3 numbers selected";
    }
}

function generateGrid() {

    const maxRange = getMaxRange();

    const numbers =
        generateUniqueNumbers(
            9,
            1,
            maxRange
        );

    grid.innerHTML = "";

    numbers.forEach(number => {

        const cell =
            document.createElement("div");

        cell.className = "cell";
        cell.textContent = number;

        if (trackersFull()) {
            cell.classList.add("disabled");
        }
        else {
            cell.addEventListener(
                "click",
                () => selectNumber(number)
            );
        }

        grid.appendChild(cell);
    });

    refreshBtn.disabled = trackersFull();

    updateMessage();
}

function selectNumber(number) {

    if (trackersFull()) return;

    for (const tracker of trackers) {

        if (tracker.textContent === "") {

            tracker.textContent = number;

            // Auto refresh after selection
            generateGrid();

            return;
        }
    }
}

function manualRefresh() {

    if (trackersFull()) return;

    generateGrid();
}

function resetGame() {

    trackers.forEach(tracker => {
        tracker.textContent = "";
    });

    generateGrid();
}

generateGrid();
</script>

</body>
</html>
